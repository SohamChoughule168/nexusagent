# Security Checks
#
# Runs dependency vulnerability scanning on every push to `main` and every
# pull request targeting `main`. Three independent jobs run in parallel:
#   - python-audit       : pip-audit over the Python dependency tree
#   - npm-audit          : npm audit (moderate+) over the frontend lockfile
#   - dependency-review  : GitHub Dependency Review on pull requests only
#
# A found vulnerability fails the relevant job (and therefore the PR gate).

name: Security Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  # Dependency Review posts a summary comment on the PR.
  pull-requests: write
  # Trivy uploads SARIF to the GitHub Security tab.
  security-events: write

jobs:
  # --------------------------------------------------------- Python (pip-audit)
  python-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      # The project is not installed via `pip install .` (its packaged
      # `packages` list does not match the layout under backend/app). Install
      # the pinned runtime dependencies directly so pip-audit can scan them.
      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python - <<'PY'
          import tomllib, subprocess, sys
          with open("pyproject.toml", "rb") as fh:
              data = tomllib.load(fh)
          subprocess.check_call(
              [sys.executable, "-m", "pip", "install", *data["project"]["dependencies"]]
          )
          PY
          python -m pip install pip-audit==2.7.3

      - name: Run pip-audit
        # Audits the installed environment; non-zero exit fails the job on
        # discovered vulnerabilities.
        run: python -m pip_audit

  # ------------------------------------------------------------- Frontend (npm)
  npm-audit:
    name: Frontend Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (moderate and higher)
        run: npm audit --audit-level=moderate

  # -------------------------------------------------------- Dependency Review
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    # Dependency Review only makes sense for PRs (it diffs the dependency
    # manifest against the base branch).
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail the PR if it introduces a vulnerability of this severity or
          # higher in the dependency graph.
          fail-on-severity: high

  # ----------------------------------------------------------- Python SAST (Bandit)
  bandit:
    name: Python SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: python -m pip install --upgrade pip && python -m pip install bandit==1.7.9

      - name: Run Bandit over the backend application
        # Scan the application package (not tests/venv). Fail only on HIGH
        # severity findings; tighten to MEDIUM once the baseline is clean.
        run: bandit -r backend/app -x backend/app/tests -l high -ll

  # ----------------------------------------------------------- Container scan (Trivy)
  trivy:
    name: Container & Filesystem Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy CLI
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.55.2

      - name: Trivy filesystem scan (secrets, misconfig, dependency CVEs)
        # Scans our own source + IaC/config (Dockerfiles, compose, nginx) for
        # misconfigurations and leaked secrets. Node/Python dependencies are
        # excluded here because they are covered by `npm audit` / `pip-audit`;
        # this scan focuses on the unique Trivy value (secret + config scanning).
        run: |
          trivy fs \
            --scanners vuln,secret,config \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --format sarif \
            --output trivy-fs.sarif \
            --exclude '**/node_modules/**' \
            --exclude '**/.git/**' \
            --exclude '**/.venv/**' \
            --exclude '**/__pycache__/**' \
            --exclude '**/.next/**' \
            .

      - name: Upload filesystem SARIF
        if: always()
        # Code scanning upload needs GitHub Advanced Security; don't fail the
        # pipeline if it isn't enabled on the repo.
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Build backend image (for image scan)
        run: docker build -f backend/Dockerfile -t nexusagent-backend:ci .

      - name: Build frontend image (for image scan)
        run: docker build -f frontend/Dockerfile -t nexusagent-frontend:ci ./frontend

      - name: Trivy image scan (backend)
        # Only fail on CRITICAL, unfixed issues so ephemeral base-image noise
        # does not red the pipeline; fixable CRITICALs still fail and prompt an
        # image bump.
        run: |
          trivy image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            nexusagent-backend:ci

      - name: Trivy image scan (frontend)
        run: |
          trivy image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            nexusagent-frontend:ci

