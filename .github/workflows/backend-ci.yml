# Backend CI
#
# Validates the Python (FastAPI) backend on every push to `main` and every
# pull request targeting `main`. Runs linting, type checking, and the test
# suite with coverage. The test job provisions ephemeral Postgres + Redis
# service containers so the DB-backed test surface can run without external
# infrastructure.
#
# Fails the build on: any ruff violation, any test failure, or a coverage run
# error. (Type checking via mypy is currently informational — see the note in
# pyproject.toml — and does not block the merge.)

name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege token for read-only CI.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  # ----------------------------------------------------------------- Lint/Types
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install lint tooling
        run: python -m pip install --upgrade pip ruff==0.6.9 mypy==1.11.2

      - name: Ruff lint (blocking)
        # Configured in pyproject.toml [tool.ruff]; fails the build on violations.
        run: ruff check backend/app backend/tests

      - name: Mypy type check (informational)
        # The backend is only partially annotated; mypy is run non-blocking so it
        # surfaces the current error count without red-lining every PR. See the
        # incremental-adoption note in pyproject.toml [tool.mypy].
        continue-on-error: true
        run: mypy backend/app

  # --------------------------------------------------------------------- Tests
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    # Ephemeral services the test suite depends on.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexusagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Point the (synchronous) SQLAlchemy engine at the Postgres service.
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/nexusagent
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret
      JWT_REFRESH_SECRET_KEY: ci-test-refresh-secret
      SECURITY_PASSWORD_SALT: ci-test-salt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      # The `app` package is installed as a normal top-level import via
      # `pip install .` (see [tool.setuptools] in pyproject.toml), so no
      # PYTHONPATH is required for imports or coverage.
      - name: Install dependencies
        # The `app` package is installed via `pip install .` (see
        # [tool.setuptools] in pyproject.toml: package-dir maps the root
        # namespace to backend/, so `app` installs as a top-level importable
        # package). No PYTHONPATH manipulation is required.
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install alembic==1.13.1
          python -m pip install pytest==8.2.0 pytest-asyncio==0.23.0 pytest-cov==5.0.0

      - name: Create database schema (Alembic migrations)
        # Phase 4: the schema under test is produced by the REAL migration chain
        # (`alembic upgrade head`), NOT Base.metadata.create_all. This validates
        # that the committed migrations match what the application/tests expect,
        # exactly as production is provisioned.
        working-directory: backend
        run: alembic upgrade head

      - name: Run tests with coverage
        run: >-
          pytest
          --cov=app
          --cov-report=xml:coverage.xml
          --cov-report=html:htmlcov
          --junitxml=test-results/junit.xml
          -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: warn

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: test-results/junit.xml
          if-no-files-found: warn

  # ------------------------------------------------- Migrate → Seed → Smoke
  # Phase 4 deployment-path validation. This job provisions the schema the way
  # PRODUCTION does — `alembic upgrade head` (never Base.metadata.create_all) —
  # then seeds the demo workspace and boots the real ASGI app to smoke-test the
  # operational endpoints (/health, /ready, /version). It is the CI proof that a
  # fresh database can be migrated, seeded, and served.
  deploy-validation:
    name: Migrate, Seed & Smoke Test
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexusagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/nexusagent
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret
      JWT_REFRESH_SECRET_KEY: ci-test-refresh-secret
      SECURITY_PASSWORD_SALT: ci-test-salt
      # Keep the smoke run offline/deterministic (no external LLM calls).
      EMBEDDINGS_PROVIDER: local
      RAG_LLM_PROVIDER: local

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install alembic==1.13.1

      - name: Apply migrations (alembic upgrade head)
        # The production provisioning command. NOT Base.metadata.create_all.
        working-directory: backend
        run: alembic upgrade head

      - name: Seed demo workspace
        # Runs against the already-migrated database (no --init-db, so it does
        # not fall back to create_all — it must work on the migrated schema).
        run: python backend/scripts/seed_demo.py

      - name: Boot app and smoke-test operational endpoints
        # Start the real ASGI app, wait for readiness, then assert the Phase 4
        # health/version endpoints respond as expected. Fails the job on any
        # non-2xx (or a 503 from /ready) so a broken deployment path is caught.
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          APP_PID=$!
          echo "Started app (pid $APP_PID); waiting for /health..."
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null 2>&1; then
              echo "app is up"
              break
            fi
            sleep 2
          done
          set -e
          echo "== /health ==";   curl -fsS http://127.0.0.1:8000/health
          echo "== /liveness =="; curl -fsS http://127.0.0.1:8000/liveness
          echo "== /ready ==";    curl -fsS http://127.0.0.1:8000/ready
          echo "== /version ==";  curl -fsS http://127.0.0.1:8000/version
          kill "$APP_PID" || true

      - name: Deployment-ready summary
        run: |
          {
            echo "### ✅ Deployment path validated"
            echo ""
            echo "- Migrations applied via \`alembic upgrade head\`"
            echo "- Demo workspace seeded on the migrated schema"
            echo "- App booted and smoke-tested (/health, /liveness, /ready, /version)"
          } >> "$GITHUB_STEP_SUMMARY"
