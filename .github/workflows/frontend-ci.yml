# Frontend CI
#
# Validates the Next.js (React/TypeScript) frontend on every push to `main` and
# every pull request targeting `main`. Runs ESLint, type checking, the unit
# test suite, and a production Next.js build.
#
# Fails the build on: any lint error, any type error, any test failure, or a
# failed production build. The build job depends on lint + test so we never
# spend minutes building an image/app that is already known-broken.

name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

# All frontend commands run from the frontend/ workspace.
defaults:
  run:
    working-directory: frontend

jobs:
  # ------------------------------------------------------------------ Lint/Types
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Type check (tsc --noEmit)
        run: npm run type-check

  # ---------------------------------------------------------------------- Tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (Vitest)
        # `npm test` -> `vitest run`. Emit a JUnit report for artifact upload.
        run: |
          mkdir -p test-results
          npm test -- --reporter=junit --outputFile=test-results/junit.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: frontend/test-results/
          if-no-files-found: warn

  # ---------------------------------------------------------------------- Build
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Next.js production build
        run: npm run build
