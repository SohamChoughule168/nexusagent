# NexusAgent AI - Production Nginx reverse proxy (HTTP, active by default)
#
# Responsibilities:
#   * Terminate and reverse-proxy the Next.js frontend (port 3000).
#   * Reverse-proxy the FastAPI backend under /api (port 8000), including
#     WebSocket upgrades.
#   * Serve the backend health endpoint at /health.
#   * Compress responses (gzip), set security + cache headers, and cap upload
#     size.
#
# TLS is NOT enabled here. See nginx/tls.conf.example for the HTTPS variant
# (HTTP->HTTPS redirect, HSTS, certificate placeholders).

# Upstreams ---------------------------------------------------------------
upstream backend_upstream {
    server backend:8000;
    keepalive 32;
}

upstream frontend_upstream {
    server frontend:3000;
}

# HTTP server (active) -----------------------------------------------------
server {
    listen 80;
    server_name _;

    # ---- Request size limit (matches MAX_UPLOAD_SIZE_MB defaults) ----
    client_max_body_size 50M;

    # ---- Gzip compression ----
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype;

    # ---- Security headers (HSTS is added in the TLS config) ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Content-Security-Policy: same-origin app (UI + /api on one origin).
    # 'unsafe-inline'/'unsafe-eval' are kept for Next.js runtime compatibility;
    # tighten to nonce-based script-src once next.config supplies nonces.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # The backend also sets these headers (defense-in-depth for direct access);
    # strip the upstream copies so nginx is the single source of truth and no
    # duplicate headers reach the client.
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header X-Frame-Options;
    proxy_hide_header X-XSS-Protection;
    proxy_hide_header Referrer-Policy;
    proxy_hide_header Content-Security-Policy;
    proxy_hide_header Permissions-Policy;

    # ---- Health endpoint routing (backend /health) ----
    location = /health {
        proxy_pass http://backend_upstream/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ---- API: backend (REST + WebSocket upgrades) ----
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        # Allow large request/response bodies for uploads and streaming.
        client_max_body_size 50M;
        proxy_request_buffering off;
    }

    # ---- Frontend static assets (cache aggressively, immutable) ----
    location /_next/static/ {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
    }

    # ---- Everything else: frontend (Next.js) ----
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket support (Next.js HMR / dev)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
