# NexusAgent AI - Production-like local deployment (single host)
#
# Services: nginx (reverse proxy) · frontend (Next.js) · backend (FastAPI)
#           · postgres · redis
# Does NOT include: Kubernetes, AWS, CI/CD, monitoring, LB.
#
# Build & run:
#   docker compose up -d --build
# Validate config:
#   docker compose config
#
# The backend image is built from the REPOSITORY ROOT (its Dockerfile copies
# the root-level pyproject.toml + backend/). The nginx service proxies the
# frontend and backend and is the public entrypoint (ports 80 / 443).
#
# Secrets come from a local .env file (gitignored). Copy .env.example to .env
# and fill in real values. Variables below fall back to safe LOCAL defaults so
# `docker compose up` works out of the box for a localhost demo.

name: nexusagent

services:
  # ---------------------------------------------------------------- PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: nexusagent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexusagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexusagent}
      POSTGRES_DB: ${POSTGRES_DB:-nexusagent}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexusagent-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexusagent} -d ${POSTGRES_DB:-nexusagent}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------- Redis
  redis:
    image: redis:7-alpine
    container_name: nexusagent-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nexusagent-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # -------------------------------------------------------------------- Backend
  backend:
    build:
      # Built from the repository ROOT: the Dockerfile copies the root-level
      # pyproject.toml + backend/ (see backend/Dockerfile and [tool.setuptools]
      # package-dir mapping). Using ./backend here would break the build.
      context: .
      dockerfile: backend/Dockerfile
      # Build metadata surfaced by GET /version (falls back to "unknown").
      args:
        BUILD_GIT_SHA: "${BUILD_GIT_SHA:-unknown}"
        BUILD_TIMESTAMP: "${BUILD_TIMESTAMP:-unknown}"
    image: nexusagent-backend:latest
    container_name: nexusagent-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Runtime binds to this port (Dockerfile CMD uses ${PORT}).
      PORT: "8000"
      # Database: override localhost with the compose service name. The
      # application's DATABASE_URL default points at localhost; here we point it
      # at the postgres container. Use the SYNC driver (psycopg2) at runtime.
      DATABASE_URL: "postgresql+psycopg2://${POSTGRES_USER:-nexusagent}:${POSTGRES_PASSWORD:-nexusagent}@db:5432/${POSTGRES_DB:-nexusagent}"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/1"
      CELERY_RESULT_BACKEND: "redis://redis:6379/2"
      # App
      APP_NAME: "${APP_NAME:-NexusAgent AI}"
      APP_VERSION: "${APP_VERSION:-0.1.0}"
      DEBUG: "false"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      LOG_FORMAT: "${LOG_FORMAT:-json}"
      # JWT secrets (REQUIRED in production - set real values in .env)
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-change-me-in-production}"
      JWT_REFRESH_SECRET_KEY: "${JWT_REFRESH_SECRET_KEY:-change-me-in-production}"
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}"
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: "${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}"
      # LLM providers (leave blank to use the offline/local fallbacks)
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENROUTER_BASE_URL: "${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      EMBEDDINGS_PROVIDER: "${EMBEDDINGS_PROVIDER:-local}"
      RAG_LLM_PROVIDER: "${RAG_LLM_PROVIDER:-local}"
      RAG_LLM_MODEL: "${RAG_LLM_MODEL:-openai/gpt-4o-mini}"
      # CORS: allow the frontend origin(s) the browser loads from.
      BACKEND_CORS_ORIGINS: "${BACKEND_CORS_ORIGINS:-http://localhost:3000,http://localhost,http://127.0.0.1:3000}"
      RATE_LIMIT_PER_MINUTE: "${RATE_LIMIT_PER_MINUTE:-100}"
      MAX_UPLOAD_SIZE_MB: "${MAX_UPLOAD_SIZE_MB:-50}"
      ENABLE_COST_TRACKING: "${ENABLE_COST_TRACKING:-true}"
      SECURITY_PASSWORD_SALT: "${SECURITY_PASSWORD_SALT:-change-me-in-production}"
      SECURITY_FORCE_DEV_MODE: "${SECURITY_FORCE_DEV_MODE:-false}"
      ENABLE_WEBHOOK_TOOL: "${ENABLE_WEBHOOK_TOOL:-true}"
      ENABLE_LEAD_CAPTURE_TOOL: "${ENABLE_LEAD_CAPTURE_TOOL:-true}"
      ENABLE_HUMAN_ESCALATION_TOOL: "${ENABLE_HUMAN_ESCALATION_TOOL:-true}"
      TOOL_EXECUTION_TIMEOUT_SECONDS: "${TOOL_EXECUTION_TIMEOUT_SECONDS:-15.0}"
      TOOL_EXECUTION_MAX_OUTPUT_CHARS: "${TOOL_EXECUTION_MAX_OUTPUT_CHARS:-10000}"
    # ---- Container hardening (Milestone 7, Phase 6) ----
    # Drop all Linux capabilities (the backend binds an unprivileged port and
    # needs none). Bound CPU/memory/PID to contain a runaway process.
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: "1.0"
    pids_limit: 256
    tmpfs:
      - /tmp
    ports:
      - "8000:8000"
    networks:
      - nexusagent-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ------------------------------------------------------------------- Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Inlined into the client bundle at build time. The browser calls the
        # backend directly, so this is the origin the user loads the UI from.
        NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}"
        # Build metadata (provenance) — falls back to "unknown".
        BUILD_GIT_SHA: "${BUILD_GIT_SHA:-unknown}"
        BUILD_TIMESTAMP: "${BUILD_TIMESTAMP:-unknown}"
    image: nexusagent-frontend:latest
    container_name: nexusagent-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    # ---- Container hardening (Milestone 7, Phase 6) ----
    # Read-only root FS + tmpfs /tmp; drop all capabilities. The Next.js
    # production server is stateless, so this is safe. Telemetry writes are
    # disabled so the read-only FS is never touched.
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 512m
    cpus: "1.0"
    pids_limit: 256
    ports:
      - "3000:3000"
    networks:
      - nexusagent-net
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:3000'+'/').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------- Nginx
  nginx:
    image: nginx:1.27-alpine
    container_name: nexusagent-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      # Enable once TLS certs are mounted (see nginx/tls.conf.example and
      # docs/deployment/production.md):
      #   - "443:443"
    volumes:
      # Active reverse-proxy config (serves HTTP; prepared for TLS).
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount real certs here to enable HTTPS, then reference them in
      # nginx/tls.conf.example and switch the active config:
      #   - ./nginx/certs:/etc/nginx/certs:ro
    # ---- Container hardening (Milestone 7, Phase 6) ----
    # Bound CPU/memory/PID. nginx's master process binds port 80/443 and drops
    # to the unprivileged `nginx` worker user; its capability set is managed by
    # the upstream image, so we leave capabilities untouched here and document
    # the non-root-on-high-port alternative in docs/deployment/security-headers.md.
    mem_limit: 128m
    pids_limit: 128
    networks:
      - nexusagent-net
    healthcheck:
      # Hits the health endpoint routed through nginx -> backend.
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:

networks:
  nexusagent-net:
    driver: bridge
